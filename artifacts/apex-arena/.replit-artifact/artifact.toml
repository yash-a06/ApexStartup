kind = "web"
previewPath = "/"
title = "Apex Arena"
version = "1.0.0"
id = "artifacts/apex-arena"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20764

[services.development]
run = "pnpm --filter @workspace/apex-arena run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/apex-arena", "run", "build" ]
publicDir = "artifacts/apex-arena/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20764"
BASE_PATH = "/"
